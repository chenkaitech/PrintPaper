<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title id="title-el"
  data-en="PrintPaper · Printable Paper Templates"
  data-zh="PrintPaper · 打印纸模板生成器">
  PrintPaper · Printable Paper Templates
</title>

<meta name="description" id="meta-desc"
  data-en="PrintPaper is a highly customizable printable paper generator for notes, design, planning, calligraphy and music writing."
  data-zh="PrintPaper 是一款高度可定制的打印纸模板生成工具，适用于笔记、设计、计划、书法与音乐创作。">

<link rel="icon" href="printpaper_128.png">

<style>
:root{
  --bg:#F6F8FB;
  --surface:#FFFFFF;
  --text:#0F172A;
  --text2:#64748B;
  --accent:#2563EB;
  --accent2:#1D4ED8;
}

*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,"PingFang SC","Microsoft Yahei",sans-serif}

.container{max-width:1100px;margin:0 auto;padding:40px 24px}

nav{display:flex;justify-content:space-between;align-items:center}

.brand{font-weight:800;font-size:18px;display:flex;gap:10px;align-items:center}

.nav-links{display:flex;gap:18px}
.nav-links a{color:var(--text2);text-decoration:none;font-weight:600}

.nav-links a:hover{color:var(--text)}

.lang-switch button{margin-left:8px}

.hero{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:36px;
  margin-top:40px;
  align-items:center;
}

.hero h1{font-size:44px;margin:0 0 16px;line-height:1.1}
.hero p{color:var(--text2);font-size:18px}

.button{
  display:inline-block;
  padding:12px 18px;
  border-radius:12px;
  background:linear-gradient(180deg,var(--accent),var(--accent2));
  color:white;
  font-weight:700;
  text-decoration:none;
}

.button.ghost{
  background:transparent;
  color:var(--text);
  border:1px solid #D0D7E2;
  margin-left:10px;
}

.card{
  background:var(--surface);
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.section{margin-top:80px}

.grid-3{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.text2{color:var(--text2);line-height:1.6}

.tag{
  display:inline-block;
  font-size:12px;
  padding:4px 8px;
  background:#EAF1FF;
  color:var(--accent);
  border-radius:6px;
  font-weight:700;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.gallery img{
  width:100%;
  border-radius:12px;
  background:#fff;
  box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.footer{
  margin-top:80px;
  border-top:1px solid #E5EAF2;
  padding:30px 0;
  color:var(--text2);
}
</style>
</head>

<body>
<div class="container">

<nav>
  <div class="brand">
    PrintPaper
  </div>

  <div class="nav-links">
    <a href="#features" data-en="Features" data-zh="功能"></a>
    <a href="#privacy" data-en="Privacy" data-zh="隐私"></a>
    <a href="#support" data-en="Support" data-zh="支持"></a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1 data-en="Create printable paper templates in seconds."
        data-zh="几秒钟生成你的打印纸模板"></h1>

    <p data-en="Lined, grid, dot, handwriting, planner, calligraphy and music staff paper — fully customizable and exportable."
       data-zh="横线纸、方格纸、点阵纸、字帖、计划表、书法纸、五线谱 —— 全部可自定义并支持导出打印。"></p>

    <div style="margin-top:20px">
      <a class="button" href="#features" data-en="Explore Templates" data-zh="浏览模板"></a>
      <a class="button ghost" href="#features" data-en="Start Creating" data-zh="开始创建"></a>
    </div>
  </div>

  <div class="card">
    <h3 data-en="Live Preview" data-zh="实时预览"></h3>
    <p class="text2" data-en="Adjust grid, margins and styles instantly." data-zh="实时调整网格、边距与样式。"></p>
    <div style="height:240px;background:#F3F6FF;border-radius:12px;display:grid;place-items:center">
      A4 Preview
    </div>
  </div>
</section>

<!-- FEATURES -->
<section id="features" class="section">
  <h2 data-en="Core Features" data-zh="核心功能"></h2>

  <div class="grid-3" style="margin-top:20px">

    <div class="card">
      <div class="tag">Templates</div>
      <h3 data-en="Rich Template Library" data-zh="丰富模板库"></h3>
      <p class="text2" data-en="Grid, lined, dot, Cornell notes, storyboard, calligraphy grids, music staff."
         data-zh="方格纸、横线纸、点阵纸、康奈尔笔记、分镜、字帖、五线谱。"></p>
    </div>

    <div class="card">
      <div class="tag">Editor</div>
      <h3 data-en="Advanced Custom Editor" data-zh="高级编辑器"></h3>
      <p class="text2" data-en="Customize spacing, line style, margins, colors, watermark and page layout."
         data-zh="自定义间距、线条、边距、颜色、水印与页面布局。"></p>
    </div>

    <div class="card">
      <div class="tag">Export</div>
      <h3 data-en="PDF / PNG Export" data-zh="导出"></h3>
      <p class="text2" data-en="Export high quality printable PDF or PNG files."
         data-zh="导出高质量 PDF 或 PNG 文件。"></p>
    </div>

  </div>
</section>

<!-- SUPPORT (保留原结构) -->
<section id="support" class="section">
  <div class="card">
    <h2 data-en="Support" data-zh="支持"></h2>
    <p class="text2"
       data-en="If you have any questions or feedback, contact us anytime."
       data-zh="如果你有任何问题或建议，请随时联系我们。"></p>

    <p>
      <a href="mailto:support@printpaper.app">support@printpaper.app</a>
    </p>
  </div>
</section>

<!-- PRIVACY (保留原结构) -->
<section id="privacy" class="section">
  <div class="card">
    <h2 data-en="Privacy Policy" data-zh="隐私政策"></h2>
    <p class="text2"
       data-en="PrintPaper stores all templates locally on your device. No data is uploaded."
       data-zh="PrintPaper 所有模板均存储在本地设备，不上传任何数据。"></p>
  </div>
</section>

<footer class="footer">
  <strong>PrintPaper</strong><br>
  <span data-en="Printable Paper Generator" data-zh="打印纸模板生成器"></span>
</footer>

</div>

<script>
function setLang(lang){
  document.querySelectorAll("[data-en]").forEach(el=>{
    const v = el.getAttribute(lang==="zh"?"data-zh":"data-en");
    if(v) el.textContent = v;
  });
}
setLang("en");
</script>

</body>
</html>
